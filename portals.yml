# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
# Portal Scanner Configuration
# Tailored to Isaac Musera's CV and target roles.
# Focus: Technical Support Engineer, Linux Systems Engineer, DevOps Engineer,
# Cloud Support Engineer, Solutions Engineer / Architect, and Site Reliability.

title_filter:
  positive:
    # -- Support / Operations --
    - "Support Engineer"
    - "Technical Support Engineer"
    - "Customer Support Engineer"
    - "Technical Support"
    - "Service Operations"
    - "Production Support"
    - "Application Support"
    - "Platform Support"
    - "Support Specialist"
    - "Support Analyst"
    - "Incident Manager"
    - "Operations Engineer"
    - "Site Reliability"
    - "SRE"
    - "Reliability Engineer"

    # -- Linux / Systems / Cloud --
    - "Linux Engineer"
    - "Linux Systems Engineer"
    - "Systems Engineer"
    - "System Administrator"
    - "Infrastructure Engineer"
    - "Cloud Engineer"
    - "Cloud Support Engineer"
    - "Cloud Operations"
    - "Platform Engineer"

    # -- DevOps / Automation --
    - "DevOps Engineer"
    - "DevOps"
    - "Automation Engineer"
    - "Ansible"
    - "OpenShift"
    - "Kubernetes"
    - "CI/CD"
    - "Release Engineer"

    # -- Customer-facing engineering --
    - "Solutions Engineer"
    - "Solutions Architect"
    - "Customer Engineer"
    - "Technical Account Manager"
    - "Implementation Engineer"
    - "Integration Engineer"
    - "Deployment Engineer"

  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "iOS"
    - "Android"
    - "PHP Developer"
    - "Ruby"
    - "Frontend"
    - "Designer"
    - "Data Scientist"
    - "ML Engineer"
    - "AI Engineer"
    - "LLM"
    - "NLP"
    - "Blockchain"
    - "Crypto"
    - "Sales"
    - "Account Executive"
    - "Recruiter"

  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Staff"

search_queries:
  # -- Red Hat / Linux / DevOps --
  - name: Red Hat / Linux Support
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "Linux Support Engineer" OR "Technical Support Engineer" OR "Systems Engineer" remote'
    enabled: true

  - name: DevOps / Platform / SRE
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "DevOps Engineer" OR "Platform Engineer" OR "Site Reliability Engineer" remote'
    enabled: true

  - name: Cloud Support / Infrastructure
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "Cloud Support Engineer" OR "Infrastructure Engineer" OR "Cloud Operations" remote'
    enabled: true

  - name: OpenShift / Kubernetes / Ansible
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "OpenShift" OR "Kubernetes" OR "Ansible" engineer remote'
    enabled: true

  - name: Solutions / Customer Engineering
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "Solutions Engineer" OR "Customer Engineer" OR "Implementation Engineer" remote'
    enabled: true

  - name: Fintech / Production Support
    query: '"fintech" "Support Engineer" OR "Service Operations" OR "Production Support" remote'
    enabled: true

  - name: AWS / Cloud Operations
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "AWS" "Cloud Engineer" OR "Support Engineer" OR "Operations Engineer" remote'
    enabled: true

  - name: Remote-first global / Africa / EMEA
    query: '"remote" ("Africa" OR "EMEA" OR "Kenya" OR "work from anywhere") "Support Engineer" OR "DevOps Engineer" OR "Site Reliability Engineer"'
    enabled: true

  - name: Remote support companies for Africa / Kenya
    query: '"Africa" OR "Kenya" "remote" "Technical Support Engineer" OR "Cloud Support Engineer" OR "Customer Engineer"'
    enabled: true

tracked_companies:
