    scan_query: 'site:redhat.com/en/jobs "Support Engineer" OR "OpenShift" OR "Ansible" OR "Technical Account Manager"'
    notes: "Strong fit for RHCSA/RHCE, OpenShift, Ansible, Linux support."
    enabled: true

